# Production — bind to loopback for host Caddy reverse proxy.
# On server: docker compose -f docker-compose.production.yml up -d --build

services:
  nginx:
    image: nginx:alpine
    container_name: efemer_nginx
    ports:
      - "127.0.0.1:52184:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/logs
    depends_on:
      - php
    networks:
      - efemer-network

  php:
    build:
      context: ./docker/php
    image: efemer
    container_name: efemer_php
    volumes:
      - ./.env:/var/www/.env
      - ./.platform:/var/www/.platform
      - ./.secret:/var/www/.secret
      - ./app:/var/www/app
      - ./bin:/var/www/bin
      - ./composer.json:/var/www/composer.json
      - ./composer.lock:/var/www/composer.lock
      - ./logs:/var/logs
      - ./logs:/var/www/logs
      - ./public:/var/www/public
      - ./tmp:/var/www/tmp
      - ./vendor:/var/www/vendor
    working_dir: /var/www
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - efemer-network

  mysql:
    image: mysql:8.0
    container_name: efemer_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - efemer-network

  redis:
    image: redis:alpine
    container_name: efemer_redis
    restart: always
    networks:
      - efemer-network

networks:
  efemer-network:
    driver: bridge
